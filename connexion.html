<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link rel="icon" type="image/png" href="logo/LOGO_MMA.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <script src="script_connexion.js"></script>
    <script src="verification_authentification.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">
<!-- Barre de naviguation-->
<nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Gestion MMA</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="athletes/index.html">Athlètes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="matches/index.html">Matchs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="classement/index.html">Classements</a>
                </li>
            </ul>

            <div class="ms-auto d-flex align-items-center">
                <div id="case_auth_intro" class="btn-group justify-content-end">
                    <a class="btn btn-outline-primary" href="creer_compte.html">Créer un compte</a>
                </div>
                <div id="case_connecte">
                    <p id="message_connexion" class="d-inline"></p>
                    <form id="deconnexion" class="d-inline">
                        <button>Deconnexion</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>
<div class="flex-grow-1 py-5 bg-light">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5">

                <!-- Card du form -->
                <div class="card shadow-lg border-0 rounded-4 p-4 bg-white">

                    <h2 class="text-center fw-bold mb-4">Connexion</h2>

                    <!-- Alert erreur -->
                    <div id="afficher_alert" class="alert alert-danger d-none" role="alert">
                        <p id="alert_msg_erreur" class="text-center mb-0"></p>
                    </div>

                    <form method="POST" id="form_connexion">

                        <div class="mb-3 position-relative">
                            <label for="courriel" class="form-label">Courriel <sup class="text-danger">*</sup></label>
                            <input type="email" class="form-control" id="courriel" name="courriel" required
                                   placeholder="exemple@email.com">
                        </div>

                        <div class="mb-3 position-relative">
                            <label for="password" class="form-label">Mot de passe <sup
                                    class="text-danger">*</sup></label>
                            <input type="password" class="form-control" id="password" name="password" required
                                   placeholder="••••••••">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold">Se connecter</button>

                        <p class="mt-3 text-center text-muted small">
                            Pas encore de compte? <a href="creer_compte.html">Créer un compte</a>
                        </p>

                    </form>
                </div>

            </div>
        </div>
    </div>
</div>

<footer class="bg bg-dark bg-gradient text-white text-center py-4 mt-auto">
    <div class="container">
        <p class="mb-1">© 2026 MMA Project</p>
        <small class="text-secondary">Tous droits réservés</small>
    </div>
</footer>
</body>
</html>

    <link rel="icon" type="image/png" href="../logo/LOGO_MMA.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <script src="script_classement_index.js"></script>
    <script src="../verification_authentification.js"></script>
    <style>
        .table tbody tr {
            transition: all 0.2s ease-in-out;
        }

        .table tbody tr:hover {
            transform: scale(1.01);
            background-color: #f8f9fa;
        }

        /* Top 3 styling */
        .rank-1 {
            background: linear-gradient(90deg, #ffd70033, transparent);
            font-weight: bold;
        }

        .rank-2 {
            background: linear-gradient(90deg, #c0c0c033, transparent);
            font-weight: 600;
        }

        .rank-3 {
            background: linear-gradient(90deg, #cd7f3233, transparent);
            font-weight: 600;
        }
    </style>

<body class="d-flex flex-column min-vh-100">

        <a class="navbar-brand" href="../index.html">Gestion MMA</a>

                    <a class="nav-link" aria-current="page" href="../athletes/index.html">Athlètes</a>
                </li>

                </div>
                <div id="case_connecte">
                    <p id="message_connexion" class="d-inline"></p>
                    <form id="deconnexion" class="d-inline">
                        <button>Deconnexion</button>
                    </form>
                </div>
            </div>

<div class="flex-grow-1 py-5 bg-light">

    <div class="container">

        <div class="text-center mb-4">
            <h2 class="fw-bold">Classement des Athlètes</h2>
            <p class="text-muted">Performance globale des combattants</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-12 col-lg-9">

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4">

                        <div class="table-responsive">

                            <table class="table table-hover align-middle text-center mb-0">

                                <thead class="table-dark">
                                <tr>
                                    <th scope="col">Athlète</th>
                                    <th scope="col">Victoires</th>
                                    <th scope="col">Défaites</th>
                                    <th scope="col">Différence</th>
                                </tr>
                                </thead>

                                <tbody id="body">
                                </tbody>

                            </table>

                        </div>

                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

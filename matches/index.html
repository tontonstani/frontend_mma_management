<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Matches</title>
    <link rel="icon" type="image/png" href="../logo/LOGO_MMA.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <script src="script_match.js"></script>
    <script src="../verification_authentification.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">
<!-- Barre de naviguation -->
<nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="../index.html">Gestion MMA</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="../athletes/index.html">Athlètes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Matchs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="../classement/index.html">Classements</a>
                </li>
            </ul>

            <div class="ms-auto d-flex align-items-center">
                <div id="case_auth_intro" class="btn-group justify-content-end">
                    <a class="btn btn-primary" href="../connexion.html">Se connecter</a>
                    <a class="btn btn-outline-primary" href="../creer_compte.html">Créer un compte</a>
                </div>
                <div id="case_connecte">
                    <p id="message_connexion" class="d-inline"></p>
                    <form id="deconnexion" class="d-inline">
                        <button>Deconnexion</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="flex-grow-1 mb-4">
    <h1 class="text-center">Matches</h1>
    <div class="container">
        <div id="affichage" class="row row-cols-1 g-2">
        </div>
    </div>
    <a href="ajouter.html" id="link_match_ajouter" class="d-none">Ajouter un match</a>

    <!-- Modal Détails Match -->
    <div class="modal fade" id="details_match" tabindex="-1" aria-labelledby="titremodal" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">

                <!-- HEADER -->
                <div class="modal-header bg-dark text-white border-0 rounded-top-4">
                    <h4 class="modal-title fw-bold w-100 text-center" id="titremodal">
                        Détails du match
                    </h4>
                    <button type="button" class="btn-close btn-close-white"
                            data-bs-dismiss="modal"
                            aria-label="Close"></button>
                </div>

                <!-- BODY -->
                <div class="modal-body p-4">

                    <!-- COMBATTANTS -->
                    <div class="container text-center mb-4">
                        <div class="row align-items-center">

                            <div class="col-md-5">
                                <div class="p-3 bg-light rounded-3 shadow-sm">
                                    <h5 class="fw-semibold" id="athlete_1"></h5>
                                </div>
                            </div>

                            <div class="col-md-2">
                                <h3 class="fw-bold text-danger">VS</h3>
                            </div>

                            <div class="col-md-5">
                                <div class="p-3 bg-light rounded-3 shadow-sm">
                                    <h5 class="fw-semibold" id="athlete_2"></h5>
                                </div>
                            </div>

                        </div>
                    </div>

                    <hr>

                    <!-- INFOS MATCH -->
                    <div class="text-center mt-3">
                        <p class="mb-2">
                            <strong>Date :</strong>
                            <span id="date_heure"></span>
                        </p>

                        <p class="mb-0">
                            <strong>Lieu :</strong>
                            <span id="stade"></span>
                        </p>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <button type="button"
                            class="btn btn-dark px-4 rounded-3"
                            data-bs-dismiss="modal">
                        Fermer
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>

<footer class="bg bg-dark bg-gradient text-white text-center py-4 mt-auto">
    <div class="container">
        <p class="mb-1">© 2026 MMA Project</p>
        <small class="text-secondary">Tous droits réservés</small>
    </div>
</footer>
</body>
</html>

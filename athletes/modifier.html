<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier</title>
    <link rel="icon" type="image/png" href="../logo/LOGO_MMA.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <script src="script_modifier.js"></script>
    <script src="../verification_authentification.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="../index.html">Gestion MMA</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="index.html">Athlètes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="../matches/index.html">Matchs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="../classement/index.html">Classements</a>
                </li>
            </ul>

            <div class="ms-auto d-flex align-items-center">
                <div id="case_auth_intro" class="btn-group justify-content-end">
                    <a class="btn btn-primary" href="../connexion.html">Se connecter</a>
                    <a class="btn btn-outline-primary" href="../creer_compte.html">Créer un compte</a>
                </div>
                <div id="case_connecte">
                    <p id="message_connexion" class="d-inline"></p>
                    <form id="deconnexion" class="d-inline">
                        <button>Deconnexion</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="flex-grow-1 py-5 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">

                        <h2 class="text-center mb-4 fw-bold" id="titre"></h2>

                        <form method="POST" id="form_athlete_ajouter">

                            <!-- INFOS PERSONNELLES -->
                            <h5 class="mb-3 text-secondary">Informations personnelles</h5>
                            <div class="row g-3">

                                <div class="col-md-1">
                                    <label for="id" class="form-label">Id</label>
                                    <input type="number" class="form-control" id="id" name="id" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label for="prenom" class="form-label">Prénom</label>
                                    <input type="text" class="form-control" id="prenom" name="prenom" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="nom" class="form-label">Nom</label>
                                    <input type="text" class="form-control" id="nom" name="nom" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="alias" class="form-label">Alias</label>
                                    <input type="text" class="form-control" id="alias" name="alias">
                                </div>

                                <div class="col-md-6">
                                    <label for="origine" class="form-label">Origine</label>
                                    <input type="text" class="form-control" id="origine" name="origine" required>
                                </div>

                                <div class="col-md-4">
                                    <label for="taille" class="form-label">Taille (cm)</label>
                                    <input type="number" class="form-control" id="taille" name="taille" min="100"
                                           max="250" required>
                                </div>

                                <div class="col-md-4">
                                    <label for="poids" class="form-label">Poids (kg)</label>
                                    <input type="number" class="form-control" id="poids" name="poids" min="40" max="200"
                                           required>
                                </div>

                                <div class="col-md-4">
                                    <label for="sexe" class="form-label">Sexe</label>
                                    <select class="form-select" id="sexe" name="sexe" required>
                                        <option value="">Choisir...</option>
                                        <option value="Homme">Homme</option>
                                        <option value="Femme">Femme</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label for="date_naissance" class="form-label">Date de naissance</label>
                                    <input type="date" class="form-control" id="date_naissance" name="date_naissance"
                                           required>
                                </div>

                                <div class="col-md-6 d-flex align-items-end">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="actif" name="actif">
                                        <label class="form-check-label" for="actif">Athlète actif</label>
                                    </div>
                                </div>

                            </div>

                            <!-- STATS -->
                            <hr class="my-4">

                            <h5 class="mb-3 text-secondary">Statistiques (1 à 10)</h5>

                            <div class="row g-3">

                                <div class="col-md-4">
                                    <label for="force" class="form-label">Force</label>
                                    <input type="number" class="form-control" id="force" name="pts_force" min="1"
                                           max="10" required>
                                </div>

                                <div class="col-md-4">
                                    <label for="endurance" class="form-label">Endurance</label>
                                    <input type="number" class="form-control" id="endurance" name="pts_endurance"
                                           min="1" max="10" required>
                                </div>

                                <div class="col-md-4">
                                    <label for="vitesse" class="form-label">Vitesse</label>
                                    <input type="number" class="form-control" id="vitesse" name="pts_vitesse" min="1"
                                           max="10" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="agilete" class="form-label">Agilité</label>
                                    <input type="number" class="form-control" id="agilete" name="pts_agilete" min="1"
                                           max="10" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="resilience" class="form-label">Résilience</label>
                                    <input type="number" class="form-control" id="resilience" name="pts_resilience"
                                           min="1" max="10" required>
                                </div>

                            </div>

                            <div class="mt-4">
                                <button class="btn btn-dark w-100 py-2 rounded-3" type="submit">
                                    Modifier l’athlète
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<footer class="bg bg-dark bg-gradient text-white text-center py-4 mt-auto">
    <div class="container">
        <p class="mb-1">© 2026 MMA Project</p>
        <small class="text-secondary">Tous droits réservés</small>
    </div>
</footer>
</body>
</html>
